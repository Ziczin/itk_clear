name: Deploy to LMS

on:
  push:
    branches:
      - master

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🖨️ Environment information
        run: |
          echo "=============================================="
          echo "LINT JOB ENVIRONMENT"
          echo "=============================================="
          echo "Runner OS: ${{ runner.os }}"
          echo "Runner Arch: ${{ runner.arch }}"
          echo "GitHub Ref: ${{ github.ref }}"
          echo "GitHub SHA: ${{ github.sha }}"
          echo "GitHub Actor: ${{ github.actor }}"
          echo "Python version: $(python3 --version)"
          echo "Working directory: $(pwd)"
          echo "Directory contents:"
          ls -la
          echo "=============================================="

      - name: 🔍 Ruff format check
        uses: astral-sh/ruff-action@v3
        with:
          args: format --check .
        env:
          RUFF_OUTPUT_FORMAT: full   # более подробный вывод от ruff

      - name: 🧹 Ruff lint check
        uses: astral-sh/ruff-action@v3
        with:
          args: check .
        env:
          RUFF_OUTPUT_FORMAT: full

  build:
    needs: lint
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.tags }}
      repo: ${{ steps.repo.outputs.repo }}

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🖨️ Build environment info
        run: |
          echo "=============================================="
          echo "BUILD JOB ENVIRONMENT"
          echo "=============================================="
          echo "Date: $(date -u)"
          echo "GitHub Ref: ${{ github.ref }}"
          echo "GitHub SHA: ${{ github.sha }}"
          echo "GitHub Repository: ${{ github.repository }}"
          echo "GitHub Actor: ${{ github.actor }}"
          echo "GitHub Event Name: ${{ github.event_name }}"
          echo "Runner OS: ${{ runner.os }}"
          echo "Runner Arch: ${{ runner.arch }}"
          echo "Runner Name: ${{ runner.name }}"
          echo "Docker version:"
          docker version
          echo "Docker buildx version:"
          docker buildx version
          echo "QEMU binfmt status:"
          update-binfmts --display || echo "binfmt not available (expected before QEMU setup)"
          echo "Working directory: $(pwd)"
          echo "Directory tree (first 3 levels):"
          tree -L 3 -I '.git' || ls -R | head -n 100
          echo "=============================================="

      - name: 🐳 Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/arm64,linux/amd64

      - name: 🔧 Verify QEMU installation
        run: |
          echo "QEMU emulators available:"
          docker run --rm --privileged multiarch/qemu-user-static --reset -p yes
          echo "Registered binfmt entries:"
          cat /proc/sys/fs/binfmt_misc/* 2>/dev/null || echo "binfmt_misc not mounted"

      - name: 🛠️ Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          buildkitd-flags: --debug
          driver-opts: |
            network=host
            image=moby/buildkit:latest

      - name: 📊 Buildx info
        run: |
          echo "Buildx builder list:"
          docker buildx ls
          echo "Buildx inspect:"
          docker buildx inspect --bootstrap

      - name: 🔐 Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏷️ Set lowercase repository name
        id: repo
        run: |
          echo "Original repository: ${{ github.repository }}"
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "Lowercase repository: $REPO_LOWER"
          echo "repo=$REPO_LOWER" >> $GITHUB_OUTPUT
          echo "✅ Repository name converted and saved."

      - name: 🏷️ Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.repo.outputs.repo }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-

      - name: 📋 Show generated tags
        run: |
          echo "Generated Docker tags:"
          echo "${{ steps.meta.outputs.tags }}"
          echo "JSON metadata:"
          echo '${{ steps.meta.outputs.json }}' | jq '.' || echo 'jq not available, raw: ${{ steps.meta.outputs.json }}'

      - name: 📦 Cache Python dependencies
        uses: actions/cache@v4
        id: pip-cache
        with:
          path: |
            ~/.cache/pip
            .venv
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: 📌 Cache status
        run: |
          if [ "${{ steps.pip-cache.outputs.cache-hit }}" == "true" ]; then
            echo "✅ Cache hit for Python dependencies"
          else
            echo "⚠️ Cache miss - dependencies will be downloaded"
          fi

      - name: 📄 Dockerfile content (for debug)
        run: |
          echo "=============================================="
          echo "Dockerfile contents:"
          echo "=============================================="
          cat Dockerfile
          echo "=============================================="
          echo "Requirements file:"
          cat requirements.txt || echo "No requirements.txt found"
          echo "=============================================="

      - name: 🏗️ Build and push Docker image
        uses: docker/build-push-action@v5
        id: build
        with:
          context: .
          platforms: linux/arm64,linux/amd64
          push: true
          tags: |
            ghcr.io/${{ steps.repo.outputs.repo }}:${{ github.sha }}
            ghcr.io/${{ steps.repo.outputs.repo }}:latest
          cache-from: type=gha,scope=${{ steps.repo.outputs.repo }}
          cache-to: type=gha,mode=max,scope=${{ steps.repo.outputs.repo }}
          file: ./Dockerfile
          build-args: |
            BUILDKIT_PROGRESS=plain

      - name: 🖼️ Build summary
        run: |
          echo "=============================================="
          echo "BUILD COMPLETED"
          echo "=============================================="
          echo "Image digest: ${{ steps.build.outputs.digest }}"
          echo "Image ID: ${{ steps.build.outputs.imageid }}"
          echo "Tags pushed:"
          echo "  - ghcr.io/${{ steps.repo.outputs.repo }}:${{ github.sha }}"
          echo "  - ghcr.io/${{ steps.repo.outputs.repo }}:latest"
          echo "=============================================="

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: 🖨️ Deploy job environment
        run: |
          echo "=============================================="
          echo "DEPLOY JOB ENVIRONMENT"
          echo "=============================================="
          echo "Date: $(date -u)"
          echo "GitHub Ref: ${{ github.ref }}"
          echo "GitHub SHA: ${{ github.sha }}"
          echo "GitHub Repository: ${{ github.repository }}"
          echo "Image to deploy: ghcr.io/${{ needs.build.outputs.repo }}:${{ github.sha }}"
          echo "API endpoint: https://lms.python-labs.ru/api/deploy-requests"
          echo "=============================================="

      - name: 🔐 Check LMS_API_KEY secret
        run: |
          if [ -z "${{ secrets.LMS_API_KEY }}" ]; then
            echo "❌ ERROR: LMS_API_KEY is empty or not set!"
            exit 1
          else
            echo "✅ LMS_API_KEY is set (length: ${#LMS_API_KEY} characters)"
          fi

      - name: 📨 Send deploy request with full logging
        run: |
          echo "===== Building payload ====="
          IMAGE="ghcr.io/${{ needs.build.outputs.repo }}:${{ github.sha }}"
          REPO="${{ github.repository }}"
          API_URL="https://lms.python-labs.ru/api/deploy-requests"

          echo "Image: $IMAGE"
          echo "Repository: $REPO"
          echo "API URL: $API_URL"

          # Create payload as a file to avoid escaping issues
          cat > payload.json <<'EOF'
          {
            "image": "IMAGE_PLACEHOLDER",
            "repository": "REPO_PLACEHOLDER"
          }
          EOF

          # Replace placeholders with actual values using sed (safer than variable expansion in heredoc)
          sed -i "s|IMAGE_PLACEHOLDER|$IMAGE|g" payload.json
          sed -i "s|REPO_PLACEHOLDER|$REPO|g" payload.json

          echo "Payload file content:"
          cat payload.json
          echo ""

          echo "===== Sending request with curl (full verbose) ====="
          # Use a temporary file for stderr to capture all curl verbose output
          HTTP_CODE=$(curl --verbose --trace-ascii curl_trace.txt \
            -X POST \
            -H "Content-Type: application/json" \
            -H "X-API-Key: ${{ secrets.LMS_API_KEY }}" \
            --data @payload.json \
            -o response.txt \
            -w "%{http_code}" \
            "$API_URL" 2>curl_verbose.log)

          CURL_EXIT=$?
          echo "Curl exit code: $CURL_EXIT"
          echo "HTTP status code: $HTTP_CODE"

          echo "===== Response body ====="
          cat response.txt
          echo ""

          if [ "$HTTP_CODE" != "200" ] || [ $CURL_EXIT -ne 0 ]; then
            echo "===== ❌ Deployment failed ====="
            echo "--- Curl verbose log ---"
            cat curl_verbose.log
            echo "--- Curl ASCII trace ---"
            cat curl_trace.txt
            echo "--- End of logs ---"
            exit 1
          else
            echo "===== ✅ Deployment request accepted ====="
          fi

      - name: 📋 Parse response (if successful)
        if: success()
        run: |
          if [ -f response.txt ]; then
            echo "Attempting to parse JSON response:"
            if command -v jq &> /dev/null; then
              jq '.' response.txt || echo "Invalid JSON"
            else
              echo "jq not available, showing raw response:"
              cat response.txt
            fi
          fi

      - name: 🧹 Cleanup temporary files
        if: always()
        run: rm -f payload.json response.txt curl_verbose.log curl_trace.txt